services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: itdev
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: hall_res_project
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itdev -d hall_res_project"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./reservastions-ws
    environment:
      ACTIVE_ENV: PROD
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ALLOWED_ORIGIN: http://localhost
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./reservastions-ws/uploads:/app/uploads
      - ./reservastions-ws/receipt:/app/receipt
      - ./reservastions-ws/logs:/app/logs

  frontend:
    build:
      context: ./hall_reservations
      args:
        VITE_API_BASE: ""
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
